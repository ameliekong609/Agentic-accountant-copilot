name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run tests
        run: PYTHONPATH=src python3.11 -m pytest -q
      - name: Compile check
        run: python3.11 -m compileall -q src tests
