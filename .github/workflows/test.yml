name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: python3.11 -m pip install -e .[dev]
      - name: Run tests
        run: PYTHONPATH=src python3.11 -m pytest -q
      - name: Compile check
        run: python3.11 -m compileall -q src tests
      - name: Demo smoke test
        run: PYTHONPATH=src python3.11 -m accountant_copilot.cli run-demo --output-dir /tmp/accountant-copilot-demo
      - name: Terminology scan
        run: '! grep -R -n -E "V2|v2|legacy" README.md docs'
      - name: Command help snapshot check
        run: PYTHONPATH=src python3.11 -m accountant_copilot.cli --help | grep -E "ingest-source-document|ingest-raw-inputs|export-document-inventory|match-transactions|import-trial-balance|render-statement-package|apply-review-ui-decisions|render-xlsx-statements|export-local-ui"
