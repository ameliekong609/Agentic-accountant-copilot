name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: python3.11 -m pip install -e .[dev]
      - name: Run tests
        run: PYTHONPATH=src python3.11 -m pytest -q
      - name: Compile check
        run: python3.11 -m compileall -q src tests
      - name: Terminology scan
        run: '! grep -R -n -E "Hermes|Streamlit|Preference Agent|setup-turing-workspace|engagement-state MVP" README.md docs'
      - name: Command help snapshot check
        run: |
          PYTHONPATH=src python3.11 -m accountant_copilot.cli --help | grep -E "process-documents|match-source-facts|build-tb-bridge-workpaper|prepare-workpaper|review-workpaper|serve-workpaper-portal"
          ! PYTHONPATH=src python3.11 -m accountant_copilot.cli --help | grep -E "inspect-engagement|run-engagement|setup-turing-workspace|record-preference|export-accountant-review-ui|render-statement-package|export-final-release-manifest"
